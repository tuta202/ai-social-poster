services:
  # PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: postpilot_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postpilot
      POSTGRES_PASSWORD: postpilot_dev
      POSTGRES_DB: postpilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postpilot"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: postpilot_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postpilot:postpilot_dev@db:5432/postpilot
      SECRET_KEY: dev-secret-key-change-in-production
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      FACEBOOK_APP_ID: ${FACEBOOK_APP_ID:-}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET:-}
      ALLOWED_ORIGINS: '["http://localhost:5173","http://localhost:3000"]'
      AI_TEXT_PROVIDER: ${AI_TEXT_PROVIDER:-openai}
      AI_TEXT_MODEL: ${AI_TEXT_MODEL:-gpt-4o}
      AI_MINI_MODEL: ${AI_MINI_MODEL:-gpt-4o-mini}
      AI_IMAGE_PROVIDER: ${AI_IMAGE_PROVIDER:-openai}
      AI_IMAGE_MODEL: ${AI_IMAGE_MODEL:-dall-e-3}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy

  # Frontend (React/Vite)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: postpilot_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
